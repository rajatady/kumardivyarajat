<svg viewBox="0 0 720 420" style="width:100%;display:block">
<rect width="720" height="420" fill="#FDFBF7" rx="6"/>
<line x1="72" y1="32" x2="72" y2="340" stroke="#E8E4DE" stroke-width="0.5"/>
<line x1="72" y1="340" x2="692" y2="340" stroke="#E8E4DE" stroke-width="0.5"/>
<text x="14" y="190" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui" transform="rotate(-90 14 190)">Cost (MSE)</text>
<text x="382" y="390" text-anchor="middle" font-size="11" fill="#8B8680" font-family="DM Sans,system-ui">Epoch</text>
<!-- Y axis labels -->
<text x="66" y="344" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">0</text>
<line x1="72" y1="278" x2="692" y2="278" stroke="#E8E4DE" stroke-width="0.3"/>
<text x="66" y="282" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">300</text>
<line x1="72" y1="216" x2="692" y2="216" stroke="#E8E4DE" stroke-width="0.3"/>
<text x="66" y="220" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">600</text>
<line x1="72" y1="155" x2="692" y2="155" stroke="#E8E4DE" stroke-width="0.3"/>
<text x="66" y="159" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">900</text>
<line x1="72" y1="93" x2="692" y2="93" stroke="#E8E4DE" stroke-width="0.3"/>
<text x="66" y="97" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">1200</text>
<line x1="72" y1="32" x2="692" y2="32" stroke="#E8E4DE" stroke-width="0.3"/>
<text x="66" y="36" text-anchor="end" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">1500</text>
<!-- X axis labels -->
<text x="72" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">0</text>
<text x="196" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">25</text>
<text x="320" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">50</text>
<text x="444" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">75</text>
<text x="568" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">100</text>
<text x="692" y="358" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">150</text>
<!-- Background regime bands (subtle) -->
<!-- DEAD regime: 80, 96, 105 — stay high ~1300-1400 -->
<!-- cost scale: 0=340, 1500=32. Per unit: (340-32)/1500 = 0.2053 px per cost unit -->
<!-- Width 80: stays ~1400 the whole time -->
<polyline fill="none" stroke="#BFBAB3" stroke-width="1.5" opacity="0.5" points="72,52 134,52 196,53 258,54 320,54 382,55 444,56 506,57 568,57 630,58 692,63"/>
<!-- Width 96 -->
<polyline fill="none" stroke="#BFBAB3" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 2" points="72,47 134,48 196,50 258,51 320,52 382,53 444,54 506,55 568,56 630,57 692,59"/>
<!-- Width 105 -->
<polyline fill="none" stroke="#BFBAB3" stroke-width="1.5" opacity="0.4" stroke-dasharray="2 2" points="72,44 134,45 196,46 258,48 320,49 382,50 444,51 506,52 568,53 630,54 692,55"/>
<!-- PLATEAU regime: 63, 65 — drop to ~140-150 quickly, stay there -->
<!-- cost 150 → 340 - 150*0.2053 = 309 -->
<!-- cost 700 → 340 - 700*0.2053 = 196 -->
<!-- Width 63: 692→275→155→150→145→143→141→140→139→137 -->
<polyline fill="none" stroke="#D4846A" stroke-width="2" opacity="0.7" points="72,198 97,283 134,308 196,310 258,312 320,313 382,314 444,315 506,316 568,317 630,318 692,312"/>
<!-- Width 65: similar to 63 -->
<polyline fill="none" stroke="#D4846A" stroke-width="2" opacity="0.5" stroke-dasharray="4 2" points="72,203 97,277 134,309 196,310 258,312 320,313 382,314 444,315 506,316 568,317 630,318 692,312"/>
<!-- CONVERGE regime: 110 — drops fast to ~148, stays -->
<polyline fill="none" stroke="#2D8B46" stroke-width="2" opacity="0.7" stroke-dasharray="4 2" points="72,48 97,310 134,310 196,311 258,312 320,313 382,314 444,315 506,316 568,317 630,318 692,312"/>
<!-- Width 128: stuck at ~1700 for 57 epochs, then crashes to ~150 -->
<polyline fill="none" stroke="#2D8B46" stroke-width="1.5" opacity="0.5" stroke-dasharray="2 2" points="72,32 134,48 196,56 258,66 320,78 382,90 444,103 506,131 536,210 553,277 568,303 600,308 630,310 692,312"/>
<!-- Width 64: THE STAR — stuck at ~1430 for 70 epochs, then crashes dramatically -->
<polyline fill="none" stroke="#C45D3E" stroke-width="3" points="72,34 134,46 196,49 258,50 320,50 382,51 444,51 475,52 506,67 520,89 536,120 553,172 568,225 583,275 600,299 620,307 650,309 692,311"/>
<!-- Labels -->
<text x="682" y="53" font-size="9" fill="#BFBAB3" font-family="DM Sans,system-ui" font-weight="600">80, 96, 105</text>
<text x="105" y="300" font-size="9" fill="#D4846A" font-family="DM Sans,system-ui" font-weight="600">63, 65</text>
<text x="560" y="295" font-size="9" fill="#2D8B46" font-family="DM Sans,system-ui">110, 128</text>
<!-- Arrow pointing to 64's phase transition -->
<line x1="505" y1="140" x2="540" y2="165" stroke="#C45D3E" stroke-width="1"/>
<text x="460" y="132" font-size="10" font-weight="600" fill="#C45D3E" font-family="DM Sans,system-ui">width 64</text>
<text x="460" y="144" font-size="9" fill="#C45D3E" font-family="DM Sans,system-ui">sudden collapse</text>
<!-- Legend -->
<rect x="82" y="42" width="170" height="60" rx="5" fill="#FDFBF7" stroke="#E8E4DE" stroke-width="0.5"/>
<line x1="92" y1="56" x2="112" y2="56" stroke="#BFBAB3" stroke-width="2"/>
<text x="118" y="60" font-size="9" fill="#4A4A4A" font-family="DM Sans,system-ui">Dead (80, 96, 105)</text>
<line x1="92" y1="72" x2="112" y2="72" stroke="#D4846A" stroke-width="2"/>
<text x="118" y="76" font-size="9" fill="#4A4A4A" font-family="DM Sans,system-ui">Plateau (63, 65)</text>
<line x1="92" y1="88" x2="112" y2="88" stroke="#C45D3E" stroke-width="3"/>
<text x="118" y="92" font-size="9" fill="#4A4A4A" font-family="DM Sans,system-ui">Phase transition (64)</text>
</svg>