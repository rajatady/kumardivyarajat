<svg viewBox="0 0 720 300" style="width:100%;display:block">
<rect width="720" height="300" fill="#FDFBF7" rx="6"/>
<!-- Three regime boxes -->
<!-- Plateau -->
<rect x="32" y="40" width="200" height="220" rx="8" fill="#D4846A" opacity="0.08" stroke="#D4846A" stroke-width="1" opacity="0.3"/>
<text x="132" y="68" text-anchor="middle" font-size="13" fill="#D4846A" font-family="DM Sans,system-ui" font-weight="700">PLATEAU</text>
<text x="132" y="86" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">widths 63, 65</text>
<line x1="72" y1="100" x2="192" y2="100" stroke="#D4846A" stroke-width="0.5" opacity="0.4"/>
<text x="132" y="120" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Activations distributed</text>
<text x="132" y="136" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">across many neurons</text>
<text x="132" y="162" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Z2_max ~ 9</text>
<text x="132" y="178" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">No dominant winner</text>
<text x="132" y="204" text-anchor="middle" font-size="11" fill="#D4846A" font-family="DM Sans,system-ui" font-weight="600">Cost: ~137</text>
<text x="132" y="224" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">Decent but stuck</text>
<!-- Dead -->
<rect x="260" y="40" width="200" height="220" rx="8" fill="#BFBAB3" opacity="0.1" stroke="#BFBAB3" stroke-width="1" opacity="0.4"/>
<text x="360" y="68" text-anchor="middle" font-size="13" fill="#8B8680" font-family="DM Sans,system-ui" font-weight="700">DEAD</text>
<text x="360" y="86" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">widths 80, 96, 105</text>
<line x1="300" y1="100" x2="420" y2="100" stroke="#BFBAB3" stroke-width="0.5" opacity="0.4"/>
<text x="360" y="120" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">All Z2 values negative</text>
<text x="360" y="136" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">LeakyReLU kills signal</text>
<text x="360" y="162" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Z2_max &lt; 0</text>
<text x="360" y="178" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Every neuron suppressed</text>
<text x="360" y="204" text-anchor="middle" font-size="11" fill="#8B8680" font-family="DM Sans,system-ui" font-weight="600">Cost: ~1300</text>
<text x="360" y="224" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">Catastrophic failure</text>
<!-- Converge -->
<rect x="488" y="40" width="200" height="220" rx="8" fill="#2D8B46" opacity="0.06" stroke="#2D8B46" stroke-width="1" opacity="0.3"/>
<text x="588" y="68" text-anchor="middle" font-size="13" fill="#2D8B46" font-family="DM Sans,system-ui" font-weight="700">CONVERGE</text>
<text x="588" y="86" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">widths 64, 110, 128</text>
<line x1="528" y1="100" x2="648" y2="100" stroke="#2D8B46" stroke-width="0.5" opacity="0.4"/>
<text x="588" y="120" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">1-2 neurons dominate</text>
<text x="588" y="136" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Winner-take-all dynamics</text>
<text x="588" y="162" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Z2_max ~ 14-48</text>
<text x="588" y="178" text-anchor="middle" font-size="10" fill="#4A4A4A" font-family="DM Sans,system-ui">Strong signal concentration</text>
<text x="588" y="204" text-anchor="middle" font-size="11" fill="#2D8B46" font-family="DM Sans,system-ui" font-weight="600">Cost: ~135-145</text>
<text x="588" y="224" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">Best outcome</text>
<!-- Arrows between regimes -->
<text x="243" y="155" text-anchor="middle" font-size="18" fill="#E8E4DE" font-family="DM Sans,system-ui">|</text>
<text x="471" y="155" text-anchor="middle" font-size="18" fill="#E8E4DE" font-family="DM Sans,system-ui">|</text>
<!-- Bottom label -->
<text x="360" y="285" text-anchor="middle" font-size="10" fill="#8B8680" font-family="DM Sans,system-ui">Which regime you land in depends on initialization, not architecture.</text>
</svg>